<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet" />
<style>
  :root {
    --wine: #5c1a2b;
    --wine-deep: #40121e;
    --gold: #c9a24b;
    --gold-soft: #e3c988;
    --ivory: #fbf6ef;
    --ivory-warm: #f3e9dc;
    --sage: #7c8a6a;
    --ink: #3a2a2e;
    --serif: "Cormorant Garamond", Georgia, serif;
    --script: "Great Vibes", cursive;
    --sans: "Montserrat", Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1440px; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background:
      radial-gradient(ellipse at 50% 0%, rgba(227, 201, 136, 0.28), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(92, 26, 43, 0.10), transparent 55%),
      var(--ivory);
  }
  .card {
    width: 1080px;
    height: 1440px;
    padding: 30px;
  }
  .frame {
    width: 100%;
    height: 100%;
    border: 2px solid var(--gold);
    border-radius: 4px;
    padding: 8px;
  }
  .inner {
    width: 100%;
    height: 100%;
    border: 1px solid rgba(201, 162, 75, 0.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 54px 64px 46px;
  }
  .eyebrow {
    font-size: 20px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 26px;
  }
  .occasion {
    font-family: var(--script);
    font-size: 74px;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 18px;
  }
  .names {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .names__name {
    font-family: var(--serif);
    font-weight: 600;
    color: var(--wine);
    font-size: 78px;
    line-height: 1.02;
    letter-spacing: 0.01em;
  }
  .names__amp {
    font-family: var(--script);
    font-size: 60px;
    color: var(--gold);
    line-height: 1;
    margin: 2px 0;
  }
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    width: 320px;
    margin: 26px 0 8px;
  }
  .divider__line { height: 1px; flex: 1; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .divider__diamond { width: 11px; height: 11px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 0 4px rgba(201,162,75,0.2); }
  .subtitle {
    font-family: var(--serif);
    font-style: italic;
    font-size: 32px;
    color: var(--ink);
  }
  .photo {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 0;
    margin: 8px 0 4px;
  }
  .photo img {
    max-height: 470px;
    max-width: 78%;
    object-fit: contain;
    -webkit-mask-image: linear-gradient(to bottom, #000 88%, rgba(0,0,0,0) 100%);
    mask-image: linear-gradient(to bottom, #000 88%, rgba(0,0,0,0) 100%);
  }
  .details {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 40px;
    margin-top: 6px;
  }
  .details__col {
    max-width: 320px;
  }
  .details__sep { width: 1px; background: linear-gradient(var(--gold), transparent, var(--gold)); }
  .details__label {
    font-family: var(--serif);
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    font-size: 22px;
    margin-bottom: 8px;
  }
  .details__text { font-family: var(--serif); font-size: 27px; line-height: 1.42; color: var(--ink); }
  .details__text strong { color: var(--wine); font-weight: 600; }
  .footer {
    margin-top: 30px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 24px;
    color: var(--sage);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="frame">
      <div class="inner">
        <p class="eyebrow">Together with their families</p>
        <p class="occasion">Engagement</p>

        <div class="names">
          <div class="names__name">Abin Thomas C T</div>
          <span class="names__amp">&amp;</span>
          <div class="names__name">Shilpa Susan Mathew</div>
        </div>

        <div class="divider">
          <span class="divider__line"></span>
          <span class="divider__diamond"></span>
          <span class="divider__line"></span>
        </div>
        <p class="subtitle">request the pleasure of your company</p>

        <div class="photo"><img src="couple-hero.png" alt="" /></div>

        <div class="details">
          <div class="details__col">
            <div class="details__label">When</div>
            <div class="details__text">Saturday<br /><strong>8 August 2026</strong><br />12:00 PM</div>
          </div>
          <div class="details__sep"></div>
          <div class="details__col">
            <div class="details__label">Where</div>
            <div class="details__text">Parish Hall<br /><strong>St. Mary's Jacobite Syrian Cathedral</strong><br />Manarcad</div>
          </div>
        </div>

        <p class="footer">With love and blessings</p>
      </div>
    </div>
  </div>
</body>
</html>
